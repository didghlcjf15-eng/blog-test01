<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>블로그 초안 생성기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="panel controls" aria-label="초안 입력">
      <div class="brand">
        <p>오제앤에스 블로그</p>
        <h1>포스팅 초안 생성기</h1>
      </div>

      <div id="apiBox" class="api-box">
        <div class="api-copy">
          <strong>Gemini API 키 설정</strong>
          <button class="help-tip" type="button" aria-label="API 키 설정 도움말" data-tooltip="Google AI Studio에서 발급한 API 키를 입력하세요. 키는 이 브라우저에만 저장되며 초안 생성 시 Gemini API 호출에만 사용됩니다.">?</button>
        </div>
      <div class="api-fields">
        <div class="field">
          <label for="apiKey">Gemini API 키</label>
          <input id="apiKey" type="password" autocomplete="off" placeholder="AIza...">
        </div>
          <div class="field">
            <label for="model">모델</label>
            <select id="model">
              <option value="auto">자동 선택: 최신 Flash Lite</option>
              <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
              <option value="gemini-3.1-flash">gemini-3.1-flash</option>
              <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
              <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          </select>
        </div>
      </div>
      <div class="model-source">
        <div class="field">
          <label for="modelSheetUrl">모델명 목록 구글시트</label>
          <input id="modelSheetUrl" type="password" autocomplete="off" placeholder="PVI자료 시트가 있는 구글스프레드시트 링크">
        </div>
        <button id="loadModelSheet" class="icon-only" type="button" aria-label="모델명 목록 불러오기" title="모델명 목록 불러오기">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6c0-1.7 3.6-3 8-3s8 1.3 8 3-3.6 3-8 3-8-1.3-8-3Z"></path><path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6"></path><path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"></path></svg>
        </button>
      </div>
      <div class="api-actions">
        <button id="saveApiKey" class="icon-only" type="button" aria-label="API 키 저장" title="API 키 저장">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h12l2 2v16H5Z"></path><path d="M8 3v6h8V3"></path><path d="M8 21v-7h8v7"></path></svg>
        </button>
        <span id="apiSavedText">저장 전</span>
      </div>
      </div>

      <input id="postType" type="hidden" value="live">

      <div class="form-stack">
        <div class="form-section import-section">
          <div class="section-head">
            <div class="section-title">
              <span>01</span>
              <div>
                <strong>엑셀 불러오기 <button class="help-tip" type="button" aria-label="엑셀 불러오기 도움말" data-tooltip="디자인요청서 엑셀을 업로드하면 행사명, 라이브 일정/시간, 모델명, 최종체감가를 자동으로 채웁니다.">?</button></strong>
              </div>
            </div>
            <label class="file-button primary-file icon-only" for="excelProductFile" aria-label="엑셀에서 불러오기" title="엑셀에서 불러오기">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"></path><path d="m7 8 5-5 5 5"></path><path d="M5 15v4h14v-4"></path></svg>
            </label>
            <input id="excelProductFile" class="visually-hidden" type="file" accept=".xlsx,.xls">
          </div>
        </div>

        <div class="form-section">
          <div class="section-title">
            <span>02</span>
            <div>
              <strong>기본 정보 <button class="help-tip" type="button" aria-label="기본 정보 도움말" data-tooltip="포스팅의 중심이 되는 행사명, 화자, 브랜드 정보를 입력합니다.">?</button></strong>
            </div>
          </div>
          <div class="grid two">
            <div class="field">
              <label for="title">핵심 제목</label>
              <input id="title" placeholder="예: 2026 New Odyssey G8 론칭 라이브">
            </div>
            <div class="field">
              <label for="persona">화자</label>
              <input id="persona" value="뽀리">
            </div>
          </div>

          <div class="grid two">
            <div class="field">
              <label for="brand">브랜드/판매처</label>
              <input id="brand" value="오제앤에스">
            </div>
            <div class="field hidden-field">
              <label for="season">시즌 문맥</label>
              <input id="season" value="5월 가정의 달">
            </div>
          </div>

          <div class="field generated-field hidden-field">
            <label for="summary">도입에서 강조할 상황</label>
            <textarea id="summary" rows="3" readonly placeholder="초안 만들기를 누르면 자동으로 생성됩니다."></textarea>
          </div>
        </div>

        <div class="form-section">
          <div class="section-title">
            <span>03</span>
            <div>
              <strong>라이브 일정 <button class="help-tip" type="button" aria-label="라이브 일정 도움말" data-tooltip="엑셀 업로드 시 일정과 시간이 자동 입력되며, 날짜에 맞춰 시즌 문맥도 자동 설정됩니다.">?</button></strong>
            </div>
          </div>
          <div class="grid two">
            <div id="dateField" class="field">
              <label id="dateLabel" for="date">일정</label>
              <input id="date" placeholder="예: 5월 20일">
            </div>
            <div id="timeField" class="field">
              <label id="timeLabel" for="time">시간</label>
              <input id="time" placeholder="예: 13시 ~ 14시">
            </div>
          </div>
        </div>

        <div id="productSection" class="form-section product-section">
          <div class="section-head">
            <div class="section-title">
              <span>04</span>
              <div>
                <strong><span id="productSectionLabel">상품구성</span> <button class="help-tip" type="button" aria-label="상품구성 도움말" data-tooltip="상품명, 모델명, 가격을 입력하거나 엑셀에서 불러오면 추천 포인트는 초안 생성 시 자동 작성됩니다.">?</button></strong>
              </div>
            </div>
            <div class="actions compact">
              <button id="fillProductPoints" class="hidden-field icon-only" type="button" aria-label="포인트 자동 생성" title="포인트 자동 생성">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 10.6 8.6 5 10l5.6 1.4L12 17l1.4-5.6L19 10l-5.6-1.4Z"></path><path d="M19 15v4"></path><path d="M17 17h4"></path></svg>
              </button>
              <button id="addProduct" class="icon-only" type="button" aria-label="상품 추가" title="상품 추가">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
              </button>
            </div>
          </div>
          <div id="productCards" class="product-cards" aria-label="상품 입력 목록"></div>
          <details class="raw-products">
            <summary>직접 입력으로 수정</summary>
            <textarea id="products" rows="5" placeholder="한 줄에 하나씩 입력하세요. 예: 오디세이 G8 | LS27HG806 | 최종체감가 946,148원 | 27형 고해상도 게이밍 모니터"></textarea>
          </details>
        </div>

        <div class="form-section">
          <div class="section-title">
            <span>05</span>
            <div>
              <strong>혜택과 링크 <button class="help-tip" type="button" aria-label="혜택과 링크 도움말" data-tooltip="라이브 쿠폰, 카드할인, 적립, 리뷰 이벤트, 바로가기 링크를 입력합니다.">?</button></strong>
            </div>
          </div>
          <div id="benefitsField" class="field">
            <label id="benefitsLabel" for="benefits">혜택/이벤트</label>
            <textarea id="benefits" rows="4" placeholder="예: 소통 이벤트 네이버페이 5천원 / 구매인증 이벤트 네이버페이 1만원 / 포토리뷰 최대 3만원"></textarea>
          </div>

          <div class="field generated-field hidden-field">
            <label for="recommend">추천 대상</label>
            <textarea id="recommend" rows="4" readonly placeholder="초안 만들기를 누르면 자동으로 생성됩니다."></textarea>
          </div>

          <div id="linkField" class="field">
            <label id="linkLabel" for="link">링크</label>
            <input id="link" placeholder="상품 또는 라이브 URL">
          </div>
          <div class="field">
            <label for="tone">원고 톤</label>
            <select id="tone">
              <option value="friendly">친근한 뽀리 톤</option>
              <option value="clean">짧고 깔끔한 정보형</option>
              <option value="sales">구매 유도 강조형</option>
              <option value="detail">상세 설명형</option>
            </select>
          </div>
        </div>

        <div class="actions form-actions">
          <button id="generate" class="primary icon-only" type="button" aria-label="초안 만들기" title="초안 만들기">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 10.6 8.6 5 10l5.6 1.4L12 17l1.4-5.6L19 10l-5.6-1.4Z"></path><path d="m16 17 3 3"></path><path d="M19 17v3h-3"></path></svg>
          </button>
          <button id="clear" class="icon-only" type="button" aria-label="입력값 비우기" title="입력값 비우기">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v7h7"></path></svg>
          </button>
        </div>
      </div>
    </section>

    <section class="panel output" aria-label="생성 결과">
      <div class="output-head">
        <div>
          <p>Generated Draft</p>
          <h2>블로그 원고</h2>
        </div>
        <div class="actions compact">
          <button id="copyTitles" class="icon-only" type="button" aria-label="제목 복사" title="제목 복사">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6V4h16v2"></path><path d="M12 4v16"></path><path d="M8 20h8"></path></svg>
          </button>
          <button id="copyHashtags" class="icon-only" type="button" aria-label="태그 복사" title="태그 복사">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 3 8 21"></path><path d="M16 3l-2 18"></path><path d="M4 9h17"></path><path d="M3 15h17"></path></svg>
          </button>
          <button id="copy" class="icon-only" type="button" aria-label="본문 복사" title="본문 복사">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="8" width="11" height="13" rx="2"></rect><path d="M5 16H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
          <button id="download" class="icon-only" type="button" aria-label="TXT 저장" title="TXT 저장">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
          </button>
        </div>
      </div>
      <div class="meta-output">
        <div class="field">
          <label for="postTitles">포스팅 제목 후보</label>
          <textarea id="postTitles" rows="3" spellcheck="false" placeholder="초안을 만들면 자동 생성됩니다."></textarea>
        </div>
        <div class="field">
          <label for="hashtags">해시태그</label>
          <textarea id="hashtags" rows="2" spellcheck="false" placeholder="초안을 만들면 자동 생성됩니다."></textarea>
        </div>
      </div>
      <div class="revision-box">
        <div class="field">
          <label for="editPrompt">수정 요청</label>
          <textarea id="editPrompt" rows="2" spellcheck="false" placeholder="예: 도입을 더 자연스럽게, 혜택을 더 강조, 문단을 짧게 정리"></textarea>
        </div>
        <button id="reviseDraft" class="icon-only" type="button" aria-label="수정 요청 적용" title="수정 요청 적용">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 10.6 8.6 5 10l5.6 1.4L12 17l1.4-5.6L19 10l-5.6-1.4Z"></path><path d="M5 19 19 5"></path></svg>
        </button>
      </div>
      <textarea id="draft" spellcheck="false" aria-label="생성된 블로그 원고"></textarea>
      <p id="status" class="status" role="status"></p>
    </section>
  </main>

  <div id="loadingOverlay" class="loading-overlay" hidden>
    <div class="loading-card" role="status" aria-live="polite">
      <div class="loader" aria-hidden="true"></div>
      <strong id="loadingTitle">생성 중입니다</strong>
      <p id="loadingMessage">잠시만 기다려 주세요.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
